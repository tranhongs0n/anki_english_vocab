<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anki Web Review & Image Finder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="review.css">
</head>
<body>
  <div class="app-container review-layout">
    <main class="review-main">
      <!-- Card Panel -->
      <section class="card-pane">
        <div id="no-cards-msg" class="no-cards-message">
          <p>No cards due today! Select another deck or enjoy your day. 🎉</p>
        </div>

        <div id="card-display" class="card-display-box hidden">
          <div class="card-content">
            <div id="card-question" class="card-side question-side"></div>
            <hr id="card-divider" class="card-divider hidden">
            <div id="card-answer" class="card-side answer-side hidden"></div>
          </div>

          <div class="card-actions">
            <!-- Show Answer Button -->
            <button id="show-answer-btn" class="btn btn-primary show-answer-btn">Show Answer</button>

            <!-- Grading Buttons -->
            <div id="grading-actions" class="grading-actions hidden">
              <button id="grade-again" class="btn btn-grade btn-again">Again</button>
              <button id="grade-hard" class="btn btn-grade btn-hard">Hard</button>
              <button id="grade-good" class="btn btn-grade btn-good">Good</button>
              <button id="grade-easy" class="btn btn-grade btn-easy">Easy</button>
            </div>
          </div>
        </div>
      </section>

    </main>

    <!-- Crawler Modal Backdrop -->
    <div id="crawler-modal" class="modal-backdrop hidden">
      <div class="crawler-modal-content">
        <div class="crawler-header">
          <h3>Quick Image Finder</h3>
          <button id="close-crawler-btn" class="close-crawler-btn">&times;</button>
        </div>
        <iframe id="crawler-iframe" src=""></iframe>
      </div>
    </div>

    <div class="shortcut-help">
      <div class="shortcut-item"><kbd>Space</kbd> <span>Show Answer</span></div>
      <div class="shortcut-item"><kbd>1</kbd>-<kbd>4</kbd> <span>Grade Card</span></div>
      <div class="shortcut-item"><kbd>F</kbd> or <kbd>S</kbd> <span>Find Image</span></div>
      <div class="shortcut-item"><kbd>L</kbd> <span>Move Later</span></div>
      <div class="shortcut-item"><kbd>O</kbd> <span>Move Other</span></div>
      <div class="shortcut-item"><kbd>,</kbd> <span>Settings</span></div>
    </div>
  </div>

  <!-- Settings Drawer -->
  <div id="settings-drawer" class="settings-drawer hidden">
    <div class="drawer-header">
      <h2>Anki Review Settings</h2>
      <button id="settings-close" class="close-btn">&times;</button>
    </div>
    <div class="drawer-body">
      <div class="setting-group">
        <label for="anki-deck">Target Deck</label>
        <select id="anki-deck">
          <option value="">-- Select Deck --</option>
        </select>
      </div>
      <div class="setting-group">
        <label for="anki-model">Note Type</label>
        <select id="anki-model">
          <option value="">-- Select Note Type --</option>
        </select>
      </div>
      <div class="setting-group">
        <label for="anki-vocab-field">Word Field (Search Term)</label>
        <select id="anki-vocab-field">
          <option value="">-- Select Field --</option>
        </select>
      </div>
      <div class="setting-group">
        <label for="anki-image-field">Image Field (Target)</label>
        <select id="anki-image-field">
          <option value="">-- Select Field --</option>
        </select>
      </div>

      <div class="setting-group-separator"></div>
      <div class="setting-section-title">Google Search (Optional)</div>

      <div class="setting-group">
        <label for="google-key">API Key</label>
        <input type="password" id="google-key" placeholder="Paste Google API Key..." autocomplete="off">
      </div>
      <div class="setting-group">
        <label for="google-cx">Search Engine ID (CX)</label>
        <input type="text" id="google-cx" placeholder="Paste Search Engine ID..." autocomplete="off">
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden">Image synced!</div>
  
  <script src="review.js"></script>
</body>
</html>
