<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vocab Image Finder</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="logo-area">
        <span id="anki-status" class="badge badge-offline">Anki Offline</span>
      </div>
      <div class="search-box">
        <input type="text" id="search-input" autocomplete="off" autofocus>
      </div>
      <button id="settings-toggle" class="settings-btn">⚙️</button>
    </header>

    <main class="results-container">
      <div id="loading" class="hidden">Fetching images...</div>
      <div id="info-message" class="info-message">Type a word above to search.</div>
      <div id="image-grid" class="image-grid"></div>
    </main>
  </div>

  <!-- Settings Drawer -->
  <div id="settings-drawer" class="settings-drawer hidden">
    <div class="drawer-header">
      <h2>Anki Settings</h2>
      <button id="settings-close" class="close-btn">&times;</button>
    </div>
    <div class="drawer-body">
      <div class="setting-group">
        <label for="anki-deck">Target Deck</label>
        <select id="anki-deck"></select>
      </div>
      <div class="setting-group">
        <label for="anki-model">Note Type</label>
        <select id="anki-model"></select>
      </div>
      <div class="setting-group">
        <label for="anki-vocab-field">Word Field</label>
        <select id="anki-vocab-field"></select>
      </div>
      <div class="setting-group">
        <label for="anki-image-field">Image Field</label>
        <select id="anki-image-field"></select>
      </div>
      <div class="setting-group checkbox-row">
        <input type="checkbox" id="quick-search" checked>
        <label for="quick-search">Fast Search (Fewer images)</label>
      </div>
    </div>
  </div>

  <!-- Linking Modal -->
  <div id="prompt-modal" class="modal-backdrop hidden">
    <div class="modal-content">
      <div class="drawer-header">
        <h3>Link Image to Card</h3>
        <button id="modal-close" class="close-btn">&times;</button>
      </div>
      <img id="modal-image-preview" src="" alt="Preview" style="max-height: 200px; object-fit: contain; width: 100%; border-radius: 8px;">
      <div class="setting-group">
        <label for="modal-vocab-input">Vocabulary Word</label>
        <input type="text" id="modal-vocab-input" placeholder="Type vocabulary word...">
      </div>
      <div id="modal-status" class="hidden"></div>
      <div class="browser-search-bar" style="justify-content: flex-end;">
        <button id="modal-cancel-btn" class="btn">Cancel</button>
        <button id="modal-confirm-btn" class="btn btn-primary">Link Card</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden">Copied!</div>
  <script src="app.js"></script>
</body>
</html>
